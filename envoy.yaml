# envoy.yaml — Envoy proxy for gRPC-web → gRPC via Tor SOCKS5
#
# This config:
# 1. Listens on 0.0.0.0:8080 for gRPC-web HTTP/1 requests
# 2. Forwards to Haveno daemon gRPC (HTTP/2)
# 3. Optionally routes through Tor SOCKS5 proxy (127.0.0.1:9050)
#
# Generate with: node -e "import('./js/torProxy.js').then(m => console.log(m.generateEnvoyConfig({havenonDaemonHost:'localhost',havenoDaemonPort:8079})))"
# Or use: yarn envoyConfig

static_resources:
  listeners:
  - name: listener_http
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          codec_type: AUTO
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: haveno
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: haveno_grpc
                  timeout: 300s
              cors:
                allow_origin_string_match:
                - prefix: "*"
                allow_methods: GET, PUT, DELETE, POST, OPTIONS
                allow_headers: keep-alive,user-agent,cache-control,content-type,content-transfer-encoding,custom-header-1,x-accept-content-transfer-encoding,x-accept-response-streaming,x-user-agent,x-grpc-web,grpc-timeout,password,authorization
                expose_headers: custom-header-1,grpc-status,grpc-message,grpc-encoding,grpc-accept-encoding
                max_age: "1728000"
          http_filters:
          - name: envoy.filters.http.grpc_web
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_web.v3.GrpcWebFilter
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
  - name: haveno_grpc
    type: STRICT_DNS
    connect_timeout: 30s
    lb_policy: ROUND_ROBIN
    http2_protocol_options: {}
    load_assignment:
      cluster_name: haveno_grpc
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: localhost
                port_value: 8079
